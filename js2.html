<!DOCTYPE html>

<body>
<h1>Problem 2</h1>

<p>Open the console to see the numbers in order.</p>

<script>
    let num1 = Number(prompt("Enter the first number:"));
    let num2 = Number(prompt("Enter the second number:"));

    if (num1 < num2) {
        console.log(num1);
        console.log(num2);
    } else {
        console.log(num2);
        console.log(num1);
    }
</script>
</body>
</html>
