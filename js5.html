<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Problem 5</title>
</head>
<body>
<h1>Problem 5</h1>

<div id="output"></div>

<script>
    function displayNames(nameString) {
        let names = nameString.split(",");

        let listItems = names.map(function(name) {
            return "<li>" + name.trim() + "</li>";
        }).join("");

        document.getElementById("output").innerHTML = "<ol>" + listItems + "</ol>";
    }

    displayNames("Pat, Chris, George, Tiffany, Susan");
</script>
</body>
</html>
